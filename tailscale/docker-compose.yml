services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: ts
    volumes:
      - $HOME/docker/tailscale:/var/lib/tailscale
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    cap_add:
      - net_admin
      - net_raw
    restart: unless-stopped

